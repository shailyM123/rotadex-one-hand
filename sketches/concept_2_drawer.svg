<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <rect width="600" height="500" fill="#f8f9fa" rx="10"/>
  
  <!-- Title -->
  <text x="30" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Concept 2: Slide-out Radial Drawer</text>
  <text x="30" y="60" font-family="sans-serif" font-size="12" fill="#7f8c8d">Cylindrical base with 7 pull-out radial drawers</text>
  
  <!-- Main Cylinder (Top View) -->
  <ellipse cx="300" cy="230" rx="150" ry="150" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <ellipse cx="300" cy="230" rx="30" ry="30" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <text x="300" y="235" font-family="sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">HUB</text>
  
  <!-- Dividing lines for 7 segments -->
  <!-- 0° (right) -->
  <line x1="330" y1="230" x2="450" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- 51.4° -->
  <line x1="323" y1="207" x2="417" y2="113" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- 102.8° -->
  <line x1="306" y1="201" x2="330" y2="81" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- 154.3° -->
  <line x1="283" y1="204" x2="191" y2="95" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- 205.7° -->
  <line x1="272" y1="218" x2="155" y2="187" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- 257.1° -->
  <line x1="275" y1="246" x2="165" y2="310" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- 308.6° -->
  <line x1="290" y1="258" x2="235" y2="365" stroke="#94a3b8" stroke-width="1.5"/>
  
  <!-- Day labels inside segments -->
  <text x="380" y="200" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">MON</text>
  <text x="355" y="140" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">TUE</text>
  <text x="280" y="120" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">WED</text>
  <text x="210" y="160" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">THU</text>
  <text x="195" y="250" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">FRI</text>
  <text x="230" y="320" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">SAT</text>
  <text x="330" y="320" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">SUN</text>
  
  <!-- One drawer pulled out (MON) -->
  <rect x="450" y="210" width="90" height="40" rx="5" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2" opacity="0.85"/>
  <text x="495" y="235" font-family="sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">MON 💊</text>
  <!-- Loop handle -->
  <ellipse cx="550" cy="230" rx="12" ry="8" fill="none" stroke="#1d4ed8" stroke-width="3"/>
  
  <!-- Pull arrow annotation -->
  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>
  <path d="M 460,260 L 530,260" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="495" y="278" font-family="sans-serif" font-size="11" fill="#ef4444" font-weight="bold" text-anchor="middle">Pull to Open</text>
  
  <!-- Side View (small) -->
  <rect x="30" y="400" width="230" height="80" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="145" y="418" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">Side View</text>
  <!-- Cylinder side -->
  <rect x="70" y="430" width="150" height="40" rx="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Suction cup -->
  <ellipse cx="100" cy="472" rx="15" ry="4" fill="#64748b"/>
  <ellipse cx="190" cy="472" rx="15" ry="4" fill="#64748b"/>
  <text x="145" y="465" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">Suction Cup Base</text>
  
  <!-- Limitations box -->
  <rect x="310" y="400" width="260" height="80" rx="5" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="320" y="418" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Limitations for Stroke Users:</text>
  <text x="320" y="436" font-family="sans-serif" font-size="10" fill="#7f1d1d">• Loop handle requires finger-hooking (pinch).</text>
  <text x="320" y="452" font-family="sans-serif" font-size="10" fill="#7f1d1d">• Drawer can be pulled fully out, spilling pills.</text>
  <text x="320" y="468" font-family="sans-serif" font-size="10" fill="#7f1d1d">• Radial drawers hard to align back smoothly.</text>
</svg>
