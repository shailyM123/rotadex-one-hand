<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8f9fa" rx="10"/>
  
  <!-- Title -->
  <text x="30" y="40" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Concept 1: Piano-Key Spring Pop-Up Box</text>
  <text x="30" y="60" font-family="'Outfit', sans-serif" font-size="12" fill="#7f8c8d">Linear layout with high-contrast spring-loaded compartment lids</text>
  
  <!-- Main Housing -->
  <rect x="50" y="150" width="480" height="120" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Compartments & Lids -->
  <!-- Mon (Closed) -->
  <rect x="60" y="155" width="60" height="110" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <text x="90" y="215" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">MON</text>
  
  <!-- Tue (Closed) -->
  <rect x="125" y="155" width="60" height="110" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <text x="155" y="215" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">TUE</text>
  
  <!-- Wed (Open) -->
  <rect x="190" y="155" width="60" height="110" rx="4" fill="#f1f5f9" stroke="#64748b" stroke-dasharray="3,3" stroke-width="1.5"/>
  <!-- Open Lid (Hinged backward) -->
  <path d="M 190,155 L 190,75 L 250,75 L 250,155 Z" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <text x="220" y="115" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle" transform="rotate(-90 220 115)">WED</text>
  <!-- Pills Inside Wed -->
  <ellipse cx="210" cy="220" rx="10" ry="5" fill="#f59e0b"/>
  <ellipse cx="230" cy="230" rx="8" ry="4" fill="#ef4444"/>
  <!-- Spring indicator -->
  <path d="M 195,155 Q 200,140 205,155" fill="none" stroke="#ef4444" stroke-width="2"/>
  
  <!-- Thu (Closed) -->
  <rect x="255" y="155" width="60" height="110" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <text x="285" y="215" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">THU</text>
  
  <!-- Fri (Closed) -->
  <rect x="320" y="155" width="60" height="110" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <text x="350" y="215" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">FRI</text>
  
  <!-- Sat (Closed) -->
  <rect x="385" y="155" width="60" height="110" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <text x="415" y="215" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">SAT</text>
  
  <!-- Sun (Closed) -->
  <rect x="450" y="155" width="60" height="110" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <text x="480" y="215" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">SUN</text>
  
  <!-- Piano Keys (Front side buttons) -->
  <!-- Closed ones (level with housing) -->
  <rect x="65" y="270" width="50" height="15" rx="2" fill="#3b82f6" stroke="#1d4ed8"/>
  <rect x="130" y="270" width="50" height="15" rx="2" fill="#3b82f6" stroke="#1d4ed8"/>
  <!-- Wed key (Pressed down) -->
  <rect x="195" y="275" width="50" height="10" rx="2" fill="#1e3a8a" stroke="#1d4ed8"/>
  
  <rect x="260" y="270" width="50" height="15" rx="2" fill="#3b82f6" stroke="#1d4ed8"/>
  <rect x="325" y="270" width="50" height="15" rx="2" fill="#3b82f6" stroke="#1d4ed8"/>
  <rect x="390" y="270" width="50" height="15" rx="2" fill="#3b82f6" stroke="#1d4ed8"/>
  <rect x="455" y="270" width="50" height="15" rx="2" fill="#3b82f6" stroke="#1d4ed8"/>

  <!-- Annotations / Labels -->
  <!-- Hand icon or pointer pointing to Wed button -->
  <path d="M 220,340 L 220,295" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="355" font-family="sans-serif" font-size="12" fill="#ef4444" font-weight="bold" text-anchor="middle">Press Key to Release Lid</text>

  <!-- Defs for arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>
  
  <!-- Limitations box -->
  <rect x="350" y="310" width="220" height="70" rx="5" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="360" y="328" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Limitations for Stroke Users:</text>
  <text x="360" y="345" font-family="sans-serif" font-size="10" fill="#7f1d1d">• Linear tray slides easily under sideways forces.</text>
  <text x="360" y="360" font-family="sans-serif" font-size="10" fill="#7f1d1d">• Standard compartment wells require pinch to scoop.</text>
</svg>
